<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mirror Twins</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1>Mirror&nbsp;Twins</h1>
      <div class="level" id="levelLabel" hidden></div>
    </header>

    <!-- Chapter / level select -->
    <section class="menu" id="menu">
      <div id="chapterScreen">
        <h2 class="menu-title">Select a Chapter</h2>
        <div class="chapters" id="chapterGrid"></div>
        <button class="textbtn continue" id="continueBtn" hidden>▶ Continue</button>
        <p class="menu-note">Clear levels to unlock new chapters. Progress is saved on this device.</p>
      </div>
      <div id="levelScreen" hidden>
        <div class="screen-head">
          <button class="textbtn" id="chaptersBackBtn">&larr; Chapters</button>
          <h2 class="menu-title" id="levelScreenTitle">Chapter</h2>
        </div>
        <div class="grid" id="levelGrid"></div>
        <p class="menu-note" id="chapterBlurb"></p>
      </div>
    </section>

    <!-- Playfield -->
    <div class="stage" id="stage" hidden>
      <canvas id="board"></canvas>
      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card">
          <div class="overlay-title" id="overlayTitle"></div>
          <div class="overlay-sub" id="overlaySub"></div>
        </div>
      </div>
    </div>

    <p class="hint" id="hint"></p>

    <!-- Touch D-pad (shown on touch devices) -->
    <div class="dpad" id="dpad" hidden>
      <button class="dbtn up" data-dir="up" aria-label="Up">&uarr;</button>
      <button class="dbtn left" data-dir="left" aria-label="Left">&larr;</button>
      <button class="dbtn right" data-dir="right" aria-label="Right">&rarr;</button>
      <button class="dbtn down" data-dir="down" aria-label="Down">&darr;</button>
    </div>

    <footer class="controls">
      <button class="textbtn" id="backBtn" hidden>&larr; Levels</button>
      <span class="keyhints" id="keyhints">
        <span class="keys"><span class="key">&larr;</span><span class="key">&uarr;</span><span class="key">&darr;</span><span class="key">&rarr;</span> move</span>
        <span class="sep">&middot;</span>
        <span><span class="key">R</span> restart</span>
      </span>
      <button class="iconbtn" id="muteBtn" aria-label="Toggle sound">🔊</button>
    </footer>

    <p class="credit">
      Mirror Twins &middot; © 2026 Anup Shetye &middot;
      <a href="https://github.com/anuq/mirror-twins" target="_blank" rel="noopener">source</a>
      (<a href="https://github.com/anuq/mirror-twins/blob/master/LICENSE" target="_blank" rel="noopener">MIT</a>)
    </p>
  </main>

  <script src="engine.js?v=3"></script>
  <script src="levels.js?v=3"></script>
  <script src="audio.js?v=3"></script>
  <script src="game.js?v=3"></script>
</body>
</html>
